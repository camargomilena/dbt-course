models: 
  - name: dim_listings_cleansed
    description: "This table contains the cleansed listings data, with invalid minimum_nights values removed."
    columns:
      - name: listing_id
        description: "Unique identifier for each listing."
        tests:
          - not_null
          - unique

      - name: host_id
        description: "Unique identifier for each host."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: "Type of room offered in the listing."
        data_tests:
          - accepted_values:
              values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']
      
      - name: minimum_nights
        description: '{{doc("dim_listing_cleansed_minimum_nights")}}'
        data_tests:
          - positive_values

  
  - name: dim_hosts_cleansed
    columns:
      - name: host_id
        tests:
          - not_null
          - unique
      - name: host_name
        data_tests:
          - not_null

      - name: is_superhost
        data_tests:
           - accepted_values:
              values: ['t', 'f']
      
    
