version: 2 

sources:
  - name: airbnb
    schema: raw
    tables:
     - name: hosts
       identifier: raw_hosts

     - name: reviews 
       identifier: raw_reviews
       config:
        loaded_at_field: date
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 24, period: day}

     - name: listings
       identifier: raw_listings 
